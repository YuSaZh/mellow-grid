<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bento 级物理碰撞重排生成器</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           1. 个人主页核心 3D 极简艺术拟物样式
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background-color: #f6f6f9;
            color: #121214;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem 8rem 2rem;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        .page-container {
            width: 100%;
            max-width: 1240px;
            display: flex;
            gap: 4rem;
            align-items: flex-start;
        }

        .sidebar {
            flex: 0 0 340px;
            position: sticky;
            top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 50;
        }

        .avatar-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #111113;
            padding: 4px;
            position: relative;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.15),
                inset 1.5px 1.5px 0px rgba(255, 255, 255, 0.15),
                inset -2px -2px 5px rgba(0, 0, 0, 0.4);
            margin-bottom: 2.2rem;
            overflow: hidden;
            cursor: pointer;
        }

        .avatar-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        .profile-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            color: #111113;
        }

        .profile-bio {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #5d5d65;
            font-weight: 400;
        }

        /* 骨架栅格自动列高 */
        .bento-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            grid-auto-rows: 188px;
            position: relative;
        }

        /* 3D 拟物圆角卡片基础设定 */
        .bento-card {
            border-radius: 38px;
            padding: 1.8rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            position: relative;
            user-select: none;
            cursor: pointer;
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.05),
                inset 1.5px 1.5px 1px rgba(255, 255, 255, 0.4),
                inset -2px -2px 3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            will-change: transform, left, top;
        }

        /* 仅在预览模式下提供卡片整体悬浮，以免影响拖拽数学计算 */
        body.is-preview-mode .bento-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 22px 45px rgba(0, 0, 0, 0.1),
                inset 1.8px 1.8px 1.2px rgba(255, 255, 255, 0.45);
        }

        .light-card {
            box-shadow: 
                0 12px 30px rgba(0, 0, 0, 0.03),
                inset 1.8px 1.8px 1px rgba(255, 255, 255, 0.9),
                inset -2px -2px 4px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .light-card:hover {
            box-shadow: 
                0 18px 40px rgba(0, 0, 0, 0.05),
                inset 2px 2px 1.5px rgba(255, 255, 255, 0.95),
                inset -2.5px -2.5px 4px rgba(0, 0, 0, 0.04);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            pointer-events: none; /* 让拖放检测直接穿透组件 */
        }

        .card-bottom {
            margin-top: auto;
            pointer-events: none;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.15rem;
        }

        .card-handle {
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.7;
        }

        .icon-3d {
            width: 46px;
            height: 46px;
            display: block;
            filter: 
                drop-shadow(1.5px 2px 1px rgba(0, 0, 0, 0.12))
                drop-shadow(4px 8px 6px rgba(0, 0, 0, 0.18));
        }

        /* Span 格栅跨度 */
        .col-span-1 { grid-column: span 1; }
        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }
        .col-span-4 { grid-column: span 4; }
        
        .row-span-1 { grid-row: span 1; }
        .row-span-2 { grid-row: span 2; }
        .row-span-3 { grid-row: span 3; }

        /* ==========================================
           2. 物理重排与流式动画状态样式 (核心)
           ========================================== */
        
        /* 卡片正被选中进行快捷调整 */
        .bento-card.is-editing {
            outline: 3.5px solid #3FA3EB !important;
            outline-offset: 4px;
            box-shadow: 0 25px 50px rgba(63, 163, 235, 0.15);
        }

        /* 正在拖拽的那个虚线占位格 (用作视觉缓冲) */
        .original-placeholder {
            opacity: 0.15 !important;
            border: 2px dashed #3FA3EB !important;
            background: rgba(63, 163, 235, 0.05) !important;
            box-shadow: none !important;
            transform: scale(0.96) !important;
        }

        /* 跟随鼠标移动的 3D 浮空镜像卡片 */
        .dragging-ghost {
            position: fixed !important;
            pointer-events: none !important;
            z-index: 3000 !important;
            box-shadow: 
                0 30px 65px rgba(0, 0, 0, 0.28),
                0 10px 20px rgba(0, 0, 0, 0.15),
                inset 1.5px 1.5px 1px rgba(255, 255, 255, 0.4) !important;
            transform: scale(1.05) rotate(1.8deg) !important;
            opacity: 0.92 !important;
            transition: none !important; /* 跟随鼠标不需要延迟 */
        }

        /* 拖拽控重尺寸拉手 (右下角滑块) */
        .resizer-handle {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 18px;
            height: 18px;
            cursor: se-resize;
            z-index: 99;
            display: none;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        body.is-edit-mode .resizer-handle {
            display: flex;
        }
        .resizer-handle:hover {
            transform: scale(1.2);
        }
        .resizer-handle svg {
            width: 10px;
            height: 10px;
            fill: rgba(255, 255, 255, 0.6);
            filter: drop-shadow(0 1.5px 2px rgba(0,0,0,0.3));
        }
        .light-card .resizer-handle svg {
            fill: rgba(0, 0, 0, 0.35);
        }

        /* ==========================================
           3. 无遮挡边缘智能避让悬浮配置盒
           ========================================== */
        .floating-editor {
            position: absolute;
            width: 330px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 28px;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.16),
                0 0 1px rgba(0, 0, 0, 0.1),
                inset 1px 1px 0 rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.5rem;
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 1.1rem;
            animation: floatingPop 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            transform-origin: top left;
        }

        @keyframes floatingPop {
            0% { opacity: 0; transform: scale(0.92) translateY(12px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .fe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .fe-header h4 {
            font-size: 1rem;
            font-weight: 800;
            color: #121214;
        }

        .fe-close-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #a0a0ab;
            cursor: pointer;
            line-height: 1;
        }

        .fe-g {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .fe-g label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #72727a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fe-g input, .fe-g select {
            padding: 0.7rem 1rem;
            border-radius: 14px;
            border: 1.5px solid rgba(0,0,0,0.08);
            font-family: inherit;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.02);
            outline: none;
            transition: all 0.25s;
        }

        .fe-g input:focus, .fe-g select:focus {
            border-color: #3FA3EB;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(63, 163, 235, 0.12);
        }

        .picker-presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.1rem;
        }

        .preset-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 3px 8px rgba(0,0,0,0.05);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .preset-dot:hover { transform: scale(1.15); }
        .preset-dot.active { border-color: #121214; transform: scale(1.08); }

        /* ==========================================
           4. 全避让底栏状态条与通用组件
           ========================================== */
        
        [contenteditable="true"] {
            border-bottom: 2px dashed rgba(63, 163, 235, 0.3);
            outline: none;
            transition: all 0.25s;
        }
        [contenteditable="true"]:focus {
            border-bottom-color: rgba(63, 163, 235, 1);
            background: rgba(63, 163, 235, 0.04);
            border-radius: 4px;
        }

        .toast-tips {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translate(-50%, -20px);
            background: #111113;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }
        .toast-tips.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .editor-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 0.7rem 2rem;
            border-radius: 100px;
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.3), 
                inset 1px 1px 0 rgba(255,255,255,0.15);
            z-index: 1000;
        }
        
        .editor-tag {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding-right: 1rem;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .editor-tag .live-dot {
            width: 8px;
            height: 8px;
            background-color: #0acf83;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(10, 207, 131, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(10, 207, 131, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(10, 207, 131, 0); }
        }

        .editor-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.55rem 1.2rem;
            border-radius: 50px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
        }
        .editor-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        .editor-btn.primary { background: #ffffff; color: #121214; }
        .editor-btn.primary:hover { background: #f1f1f5; }
        .editor-btn.danger { color: #ff5252; }
        .editor-btn.danger:hover { background: rgba(255, 82, 82, 0.1); }

        /* 卡片库默认品牌渐变色 */
        .card-twitter { background: linear-gradient(135deg, #6EC2F7 0%, #3FA3EB 100%); color: #ffffff; }
        .card-medium { background: linear-gradient(135deg, #FCFCFC 0%, #E6E6E6 100%); color: #1a1a1a; }
        .card-pinterest { background: linear-gradient(135deg, #F23C3F 0%, #C81D24 100%); color: #ffffff; }
        .card-bmc { background: linear-gradient(135deg, #FFEA79 0%, #F5C13D 100%); color: #2F2F2F; }
        .card-figma { background: linear-gradient(135deg, #2B2C2E 0%, #17181A 100%); color: #ffffff; }
        .card-discord { background: linear-gradient(135deg, #7A8CF6 0%, #5462E7 100%); color: #ffffff; }
        .card-dribbble { background: linear-gradient(135deg, #FF7EBC 0%, #E4437E 100%); color: #ffffff; }
        .card-linkedin { background: linear-gradient(135deg, #4A89D5 0%, #0B579E 100%); color: #ffffff; }
        .card-gumroad { background: linear-gradient(135deg, #FCE3FE 0%, #EAA2F0 100%); color: #311634; }
        .card-stack { background: linear-gradient(135deg, #373A40 0%, #222428 100%); color: #ffffff; }
        .card-instagram { background: linear-gradient(135deg, #9F2CAC 0%, #EA485C 50%, #F4A751 100%); color: #ffffff; }
        .card-reddit { background: linear-gradient(135deg, #FF6E43 0%, #E03504 100%); color: #ffffff; }

        .svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

        #importFileInput { display: none; }

        /* ==========================================
           5. 响应式规则
           ========================================== */
        @media (max-width: 1024px) {
            body { padding: 3rem 1.5rem 8rem 1.5rem; }
            .page-container { flex-direction: column; gap: 2.5rem; align-items: center; max-width: 760px; }
            .sidebar { flex: 0 0 auto; width: 100%; align-items: center; text-align: center; position: static; }
            .avatar-wrapper { margin-bottom: 1.5rem; }
        }
        @media (max-width: 700px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .col-span-3, .col-span-4 { grid-column: span 2 !important; }
            .editor-bar { width: 92%; border-radius: 30px; justify-content: center; flex-wrap: wrap; padding: 0.6rem 1.2rem; bottom: 1rem; }
            .editor-tag { display: none; }
        }
        @media (max-width: 480px) {
            .bento-grid { grid-template-columns: 1fr; gap: 16px; }
            .col-span-2, .col-span-3, .col-span-4, .row-span-2, .row-span-3 {
                grid-column: span 1 !important;
                grid-row: span 1 !important;
            }
            .profile-title { font-size: 2.1rem; }
        }
    </style>
</head>
<body class="is-edit-mode">

    <div class="toast-tips" id="toastTips">已自动保存更改</div>

    <!-- 原生 SVG 渐变层预设 -->
    <svg class="svg-defs">
        <defs>
            <linearGradient id="white-3d-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="65%" stop-color="#ffffff" />
                <stop offset="100%" stop-color="#dae3f0" />
            </linearGradient>
            <linearGradient id="dark-3d-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3d3e42" />
                <stop offset="100%" stop-color="#121213" />
            </linearGradient>
            <linearGradient id="figma-orange" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFA89F" /><stop offset="100%" stop-color="#F24E1E" /></linearGradient>
            <linearGradient id="figma-pink" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF97DC" /><stop offset="100%" stop-color="#FF7262" /></linearGradient>
            <linearGradient id="figma-purple" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D7B5FF" /><stop offset="100%" stop-color="#A259FF" /></linearGradient>
            <linearGradient id="figma-blue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8CE0FF" /><stop offset="100%" stop-color="#1ABCFE" /></linearGradient>
            <linearGradient id="figma-green" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7BFFBF" /><stop offset="100%" stop-color="#0ACF83" /></linearGradient>
        </defs>
    </svg>

    <!-- 拉手三角装饰图 -->
    <svg style="display: none;">
        <g id="resizer-icon">
            <path d="M6 0 L8 0 L8 8 L0 8 L0 6 L5 6 L0 1 L1 0 L6 5 Z"/>
        </g>
    </svg>

    <div class="page-container">
        <!-- 左侧文本直接打字即可修改 -->
        <div class="sidebar">
            <div class="avatar-wrapper" onclick="showToast('头像已集成防模糊原生代码，点击底栏【发布静态主页】可下载完美离线包！')">
                <svg class="avatar-svg" viewBox="0 0 100 100">
                    <rect width="100" height="100" fill="#0c0c0e"/>
                    <line x1="0" y1="20" x2="100" y2="20" stroke="#1d1d23" stroke-width="0.5"/>
                    <line x1="0" y1="40" x2="100" y2="40" stroke="#1d1d23" stroke-width="0.5"/>
                    <line x1="0" y1="60" x2="100" y2="60" stroke="#1d1d23" stroke-width="0.5"/>
                    <line x1="0" y1="80" x2="100" y2="80" stroke="#1d1d23" stroke-width="0.5"/>
                    <path d="M50,15 C41,15 28,24 28,45 C28,58 35,68 38,72 L36,85 L62,85 L60,72 C63,68 70,58 70,45 C70,24 59,15 50,15 Z" fill="#00f0ff" opacity="0.6" transform="translate(-2, 1)"/>
                    <path d="M50,15 C41,15 28,24 28,45 C28,58 35,68 38,72 L36,85 L62,85 L60,72 C63,68 70,58 70,45 C70,24 59,15 50,15 Z" fill="#ff007f" opacity="0.6" transform="translate(2, -1)"/>
                    <path d="M50,15 C41,15 28,24 28,45 C28,58 35,68 38,72 L36,85 L62,85 L60,72 C63,68 70,58 70,45 C70,24 59,15 50,15 Z" fill="#1b1c21" />
                    <rect x="15" y="30" width="18" height="4" fill="#00f0ff" opacity="0.8" />
                    <rect x="68" y="32" width="15" height="3" fill="#ff007f" opacity="0.8" />
                    <rect x="25" y="55" width="55" height="1.5" fill="#ffffff" opacity="0.9" />
                    <rect x="40" y="65" width="30" height="2" fill="#00f0ff" opacity="0.7" />
                    <rect x="20" y="74" width="12" height="3" fill="#ff007f" opacity="0.8" />
                </svg>
            </div>
            
            <h1 class="profile-title" id="profileTitle" contenteditable="true" placeholder="名称">Double Glitch 🇺🇦</h1>
            <p class="profile-bio" id="profileBio" contenteditable="true" placeholder="介绍">Hey there! My name is Roman, I'm a Ukrainian designer. I create unusual stuff with ordinary tools hoping to inspire people to unlock or boost their own creativity.</p>
        </div>

        <!-- 右侧 Bento 纯物理重塑网格区 -->
        <div class="bento-grid" id="bentoGrid"></div>
    </div>

    <!-- ==========================================
       6. 悬浮快捷控制板 (无遮罩、不折断交互，可拖拽不碍事)
       ========================================== -->
    <div class="floating-editor" id="floatingEditor">
        <div class="fe-header">
            <h4>快速参数配置</h4>
            <button class="fe-close-btn" onclick="closeFloatingEditor()">×</button>
        </div>
        <div class="fe-g">
            <label>主标题 (Title)</label>
            <input type="text" id="flTitle" placeholder="Title">
        </div>
        <div class="fe-g">
            <label>副标题 (Handle)</label>
            <input type="text" id="flHandle" placeholder="Handle">
        </div>
        <div class="fe-g">
            <label>跳转链接 (URL)</label>
            <input type="text" id="flLink" placeholder="https://...">
        </div>
        <div class="fe-g">
            <label>饰板图标 (Icon)</label>
            <select id="flIcon">
                <option value="twitter">🐦 Twitter</option>
                <option value="medium">⚫ Medium</option>
                <option value="pinterest">📌 Pinterest</option>
                <option value="bmc">☕ Buy me a Coffee</option>
                <option value="figma">🎨 Figma</option>
                <option value="discord">👾 Discord</option>
                <option value="dribbble">🏀 Dribbble</option>
                <option value="linkedin">💼 LinkedIn</option>
                <option value="gumroad">🛍️ Gumroad</option>
                <option value="stack">📚 Stack Layers</option>
                <option value="instagram">📸 Instagram</option>
                <option value="reddit">🤖 Reddit</option>
            </select>
        </div>

        // ==========================================
        // 🪄 FLIP 物理补间重排渲染算法 (核心)
        // ==========================================
        function renderUI() {
            renderGridWithDraggedCheck(null);
        }

        // 以无缝保留拖拽占位的方式渲染 Grid 骨架
        function renderGridWithDraggedCheck(draggingId) {
            document.getElementById('profileTitle').innerText = state.profile.name;
            document.getElementById('profileBio').innerText = state.profile.bio;

            const gridContainer = document.getElementById('bentoGrid');
            gridContainer.innerHTML = '';

            state.cards.forEach((card, index) => {
                const isLight = card.isLight ? 'light-card' : '';
                const aEl = document.createElement('div');
                aEl.className = `bento-card col-span-${card.colSpan} row-span-${card.rowSpan} ${card.bgClass} ${isLight}`;
                aEl.dataset.id = card.id;

                // 若此卡片正处于被拖起在鼠标上的状态，本底设为半隐框线占位格
                if (card.id === draggingId) {
                    aEl.classList.add('original-placeholder');
                }

                // 高亮选中编辑中的卡片框
                if (card.id === activeCardId) {
                    aEl.classList.add('is-editing');
                }

                aEl.innerHTML = `
                    <div class="card-top">
                        ${SVG_ICONS[card.icon] || ''}
                    </div>
                    <div class="card-bottom">
                        <div class="card-title">${escapeHTML(card.title)}</div>
                        <div class="card-handle">${escapeHTML(card.handle)}</div>
                    </div>
                    <div class="resizer-handle">
                        <svg viewBox="0 0 8 8"><use href="#resizer-icon"></use></svg>
                    </div>
                `;

                // 2. 挂载拉伸滑阻
                const handle = aEl.querySelector('.resizer-handle');
                handle.addEventListener('mousedown', function(e) {
                    startCardResize(e, card.id, aEl);
                });

                // 3. 挂载物理拖拽碰撞监听
                aEl.addEventListener('mousedown', function(e) {
                    if (!document.body.classList.contains('is-edit-mode')) return;
                    if (e.target.closest('.resizer-handle')) return;
                    if (e.target.closest('[contenteditable="true"]')) return;
                    
                    startCardDrag(e, card, aEl, index);
                });

                gridContainer.appendChild(aEl);
            });
        }

        // FLIP 流机制：计算首尾坐标，生成位置变动动画
        function flipLayout(updateModelFn) {
            const gridContainer = document.getElementById('bentoGrid');
            const cards = Array.from(gridContainer.children);
            
            // 1. FIRST: 获悉原卡片们在视窗里的物理绝对坐标
            const firstPositions = {};
            cards.forEach(card => {
                const id = card.dataset.id;
                if (id) {
                    firstPositions[id] = card.getBoundingClientRect();
                }
            });

            // 2. 更新数据，重新渲染 DOM
            updateModelFn();

            // 3. LAST: 渲染之后，计算最新物理坐标
            const newCards = Array.from(gridContainer.children);
            newCards.forEach(card => {
                const id = card.dataset.id;
                if (!id || !firstPositions[id]) return;

                const first = firstPositions[id];
                const last = card.getBoundingClientRect();

                const deltaX = first.left - last.left;
                const deltaY = first.top - last.top;

                // 4. INVERT & PLAY: 如果坐标改变，倒放并利用 requestAnimationFrame 产生滑入补间
                if (deltaX !== 0 || deltaY !== 0) {
                    card.style.transition = 'none';
                    card.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                    requestAnimationFrame(() => {
                        // 产生弹性阻尼卡片挤开滑行过渡
                        card.style.transition = 'transform 0.45s cubic-bezier(0.165, 0.84, 0.44, 1)';
                        card.style.transform = 'translate(0, 0)';
                    });
                }
            });
        }

        // ==========================================
        // 🌪️ 自控矢量拖拽重排与挤漏碰撞引擎 (Shove Engine)
        // ==========================================
        function startCardDrag(e, card, cardEl, index) {
            e.preventDefault();
            isDraggingCard = true;
            dragItem = card;
            hasTriggeredMove = false;

            dragStartX = e.clientX;
            dragStartY = e.clientY;

            // 获取卡片坐标的点击相对位移，防跳抖
            const rect = cardEl.getBoundingClientRect();
            cursorOffsetX = e.clientX - rect.left;
            cursorOffsetY = e.clientY - rect.top;

            // 克隆一份用来做 3D 悬浮镜像 (Ghost)
            dragGhostEl = cardEl.cloneNode(true);
            dragGhostEl.style.width = rect.width + 'px';
            dragGhostEl.style.height = rect.height + 'px';
            dragGhostEl.style.left = rect.left + 'px';
            dragGhostEl.style.top = rect.top + 'px';
            dragGhostEl.classList.add('dragging-ghost');

            document.addEventListener('mousemove', handleCardDrag);
            document.addEventListener('mouseup', stopCardDrag);
        }

        function handleCardDrag(e) {
            if (!isDraggingCard || !dragItem) return;

            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;

            // 设定位移缓冲区：手势移动超过 6px 时，认定启动拖拽挤开模式，而非单击
            if (!hasTriggeredMove) {
                if (Math.sqrt(dx*dx + dy*dy) > 6) {
                    hasTriggeredMove = true;
                    // 正式将悬浮体追加至 Body 顶层进行游弋
                    document.body.appendChild(dragGhostEl);
                    closeFloatingEditor(); // 单纯拖拉时锁闭配置框 

                    // 虚化底部的初始插拔槽
                    flipLayout(() => {
                        renderGridWithDraggedCheck(dragItem.id);
                    });
                }
            }

            if (hasTriggeredMove && dragGhostEl) {
                // 跟随鼠标
                dragGhostEl.style.left = (e.clientX - cursorOffsetX) + 'px';
                dragGhostEl.style.top = (e.clientY - cursorOffsetY) + 'px';

                // 物理坐标检测：获得由于 pointer-events: none 穿透取得的底下停留卡片
                const hoveredEl = document.elementFromPoint(e.clientX, e.clientY);
                if (!hoveredEl) return;

                const targetCardEl = hoveredEl.closest('.bento-card');
                if (targetCardEl && !targetCardEl.classList.contains('original-placeholder')) {
                    const targetId = targetCardEl.dataset.id;
                    const targetIndex = state.cards.findIndex(c => c.id === targetId);
                    const currentIndex = state.cards.findIndex(c => c.id === dragItem.id);

                    if (targetIndex !== -1 && currentIndex !== -1 && targetIndex !== currentIndex) {
                        // 碰撞触发：在底层队列更换两坐标模型，并带上 FLIP 瞬滑挤开排序动效！
                        flipLayout(() => {
                            state.cards.splice(currentIndex, 1);
                            state.cards.splice(targetIndex, 0, dragItem);
                            renderGridWithDraggedCheck(dragItem.id);
                        });
                    }
                }
            }
        }

        function stopCardDrag() {
            if (!isDraggingCard) return;
            isDraggingCard = false;

            document.removeEventListener('mousemove', handleCardDrag);
            document.removeEventListener('mouseup', stopCardDrag);

            // 清毁滑屏镜像
            if (dragGhostEl) {
                dragGhostEl.remove();
                dragGhostEl = null;
            }

            if (!hasTriggeredMove && dragItem) {
                // 仅点击判定：原地点击卡片，快速弹出侧调菜单 
                const originEl = document.querySelector(`[data-id="${dragItem.id}"]`);
                if (originEl) {
                    openFloatingEditor(dragItem.id, originEl);
                }
            } else {
                // 放下归位：恢复正常状态
                flipLayout(() => {
                    renderGridWithDraggedCheck(null);
                });
                saveToLocalSilent();
            }

            dragItem = null;
        }

        // ==========================================
        // 📐 尺寸调节拉拉 (Grid Row/Col Span Modifier)
        // ==========================================
        function startCardResize(e, cardId, cardEl) {
            e.stopPropagation();
            e.preventDefault();

            isResizing = true;
            resizeCardId = cardId;
            startX = e.clientX;
            startY = e.clientY;

            const rect = cardEl.getBoundingClientRect();
            startWidth = rect.width;
            startHeight = rect.height;

            const card = state.cards.find(c => c.id === cardId);
            startCol = card.colSpan || 1;
            startRow = card.rowSpan || 1;

            const gridEl = document.getElementById('bentoGrid');
            gapValue = parseFloat(getComputedStyle(gridEl).gap) || 24;
            const totalWidth = gridEl.clientWidth;
            colWidth = (totalWidth - (3 * gapValue)) / 4; 
            rowHeight = 188; 

            cardEl.style.transition = 'none'; // 滑轨控制期间取消阻尼

            document.addEventListener('mousemove', handleCardResize);
            document.addEventListener('mouseup', stopCardResize);
        }

        function handleCardResize(e) {
            if (!isResizing) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            let curWidth = startWidth + dx;
            let curHeight = startHeight + dy;

            let targetCol = Math.round((curWidth + gapValue) / (colWidth + gapValue));
            let targetRow = Math.round((curHeight + gapValue) / (rowHeight + gapValue));

            targetCol = Math.max(1, Math.min(4, targetCol));
            targetRow = Math.max(1, Math.min(3, targetRow));

            const card = state.cards.find(c => c.id === resizeCardId);
            if (card.colSpan !== targetCol || card.rowSpan !== targetRow) {
                // 实时重排：在拉格更改时，同步触发碰撞推挤算法，整列自动挤压
                flipLayout(() => {
                    card.colSpan = targetCol;
                    card.rowSpan = targetRow;
                    renderGridWithDraggedCheck(null);
                });
            }
        }

        function stopCardResize() {
            isResizing = false;
            const cardEl = document.querySelector(`[data-id="${resizeCardId}"]`);
            if (cardEl) cardEl.style.transition = '';
            
            document.removeEventListener('mousemove', handleCardResize);
            document.removeEventListener('mouseup', stopCardResize);

            renderUI();
            saveToLocalSilent();

            // 如若是当前选中状态，跟随机随调定位
            if (activeCardId === resizeCardId) {
                openFloatingEditor(activeCardId, document.querySelector(`[data-id="${activeCardId}"]`));
            }
        }

        // ==========================================
        // 📌 精细悬挂面板与实时录入
        // ==========================================
        function openFloatingEditor(cardId, cardEl) {
            activeCardId = cardId;
            const card = state.cards.find(c => c.id === cardId);
            if (!card) return;

            document.getElementById('flTitle').value = card.title;
            document.getElementById('flHandle').value = card.handle;
            document.getElementById('flLink').value = card.link;
            document.getElementById('flIcon').value = card.icon;

            renderFloatingColors(card);

            const panel = document.getElementById('floatingEditor');
            panel.style.display = 'flex';

            const rect = cardEl.getBoundingClientRect();
            const panelWidth = panel.offsetWidth || 330;
            const panelHeight = panel.offsetHeight || 380;
            const scrollY = window.scrollY;

            // 默认右侧悬浮，偏移 16 像素
            let xLeft = rect.right + 16 + window.scrollX;
            let yTop = rect.top + scrollY;

            // 右侧越界保驾：调转至卡片左侧吸附
            if (xLeft + panelWidth > window.innerWidth) {
                xLeft = rect.left - panelWidth - 16 + window.scrollX;
            }
            // 底部越界保驾：向上顶起校准
            if (yTop + panelHeight > document.body.scrollHeight) {
                yTop = document.body.scrollHeight - panelHeight - 20;
            }

            xLeft = Math.max(16, xLeft);
            yTop = Math.max(16, yTop);

            panel.style.left = `${xLeft}px`;
            panel.style.top = `${yTop}px`;

            // 高亮展示底框 
            document.querySelectorAll('.bento-card').forEach(el => el.classList.remove('is-editing'));
            cardEl.classList.add('is-editing');
        }

        function closeFloatingEditor() {
            document.getElementById('floatingEditor').style.display = 'none';
            document.querySelectorAll('.bento-card').forEach(el => el.classList.remove('is-editing'));
            activeCardId = null;
        }

        function setupLiveEditorEvents() {
            const flTitle = document.getElementById('flTitle');
            const flHandle = document.getElementById('flHandle');
            const flLink = document.getElementById('flLink');
            const flIcon = document.getElementById('flIcon');

            flTitle.addEventListener('input', (e) => {
                const card = state.cards.find(c => c.id === activeCardId);
                if (card) {
                    card.title = e.target.value;
                    const cardEl = document.querySelector(`[data-id="${activeCardId}"] .card-title`);
                    if (cardEl) cardEl.innerText = e.target.value;
                    saveToLocalSilent();
                }
            });

            flHandle.addEventListener('input', (e) => {
                const card = state.cards.find(c => c.id === activeCardId);
                if (card) {
                    card.handle = e.target.value;
                    const cardEl = document.querySelector(`[data-id="${activeCardId}"] .card-handle`);
                    if (cardEl) cardEl.innerText = e.target.value;
                    saveToLocalSilent();
                }
            });

            flLink.addEventListener('input', (e) => {
                const card = state.cards.find(c => c.id === activeCardId);
                if (card) {
                    card.link = e.target.value;
                    saveToLocalSilent();
                }
            });

            flIcon.addEventListener('change', (e) => {
                const card = state.cards.find(c => c.id === activeCardId);
                if (card) {
                    card.icon = e.target.value;
                    const iconBox = document.querySelector(`[data-id="${activeCardId}"] .card-top`);
                    if (iconBox) iconBox.innerHTML = SVG_ICONS[e.target.value] || '';
                    saveToLocalSilent();
                }
            });
        }

        function renderFloatingColors(currentCard) {
            const picker = document.getElementById('floatingColorPicker');
            picker.innerHTML = '';

            COLOR_PRESETS.forEach(preset => {
                const dot = document.createElement('div');
                dot.className = `preset-dot ${preset.class === currentCard.bgClass ? 'active' : ''}`;
                dot.style.background = preset.color;
                dot.title = preset.label;

                dot.addEventListener('click', () => {
                    document.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');

                    currentCard.bgClass = preset.class;
                    currentCard.isLight = !!preset.isLight;

                    const cardEl = document.querySelector(`[data-id="${activeCardId}"]`);
                    if (cardEl) {
                        BG_CLASSES.forEach(cls => cardEl.classList.remove(cls));
                        cardEl.classList.remove('light-card');
                        cardEl.classList.add(preset.class);
                        if (preset.isLight) cardEl.classList.add('light-card');
                    }
                    saveToLocalSilent();
                });

                picker.appendChild(dot);
            });
        }

        function toggleEditMode() {
            const isEdit = document.body.classList.contains('is-edit-mode');
            const previewBtn = document.getElementById('previewBtn');

            closeFloatingEditor();

            if (isEdit) {
                document.body.classList.remove('is-edit-mode');
                document.body.classList.add('is-preview-mode');
                document.getElementById('profileTitle').contentEditable = "false";
                document.getElementById('profileBio').contentEditable = "false";
                previewBtn.innerText = "✏️ 返回编辑";
                previewBtn.style.background = "#FFC107";
                previewBtn.style.color = "#121214";
                showToast("进入效果预览模式。卡片链接跳转功能已通畅！");
            } else {
                document.body.classList.remove('is-preview-mode');
                document.body.classList.add('is-edit-mode');
                document.getElementById('profileTitle').contentEditable = "true";
                document.getElementById('profileBio').contentEditable = "true";
                previewBtn.innerText = "👁️ 预览效果";
                previewBtn.style.background = "#ffffff";
                previewBtn.style.color = "#121214";
                showToast("重回编辑面板。按住拖曳可流式换位，拖放角标可尺寸放缩！");
            }
            renderUI();
        }

        function exportJSONConfig() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 4));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "micro-bento-shove-config.json");
            dlAnchorElem.click();
            showToast("🎉 数据已备份打包，支持在任何平台导入恢复！");
        }

        function importJSONConfig(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if (importedState.profile && Array.isArray(importedState.cards)) {
                        state = importedState;
                        renderUI();
                        saveToLocalSilent();
                        showToast("📥 库配置已无缝还原吸纳！");
                    } else {
                        alert("非法的 Bento 结构 JSON!");
                    }
                } catch(err) {
                    alert("解析失败，请检查文件格式。");
                }
            };
            reader.readAsText(file);
        }
